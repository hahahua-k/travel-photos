<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 旅行相册</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            color: white;
            padding: 32px;
            border-radius: 20px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .admin-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-link {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        
        .back-link:hover {
            color: rgba(255,255,255,0.8);
        }
        
        .section {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .section h2 {
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: var(--transition);
            background: rgba(255,255,255,0.03);
            color: white;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(67, 97, 238, 0.4);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            background: rgba(255,255,255,0.05);
        }
        
        .form-row {
            display: flex;
            gap: 16px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4361ee, #7209b7);
            color: white;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.25);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.35);
        }
        
        .btn-danger {
            background: rgba(231, 76, 60, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }
        
        .btn-danger:hover {
            background: rgba(231, 76, 60, 0.25);
        }
        
        .btn-success {
            background: rgba(6, 214, 160, 0.15);
            color: #06d6a0;
            border: 1px solid rgba(6, 214, 160, 0.2);
        }
        
        .btn-success:hover {
            background: rgba(6, 214, 160, 0.25);
        }
        
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.82rem;
        }
        
        .section-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            margin-bottom: 10px;
            transition: var(--transition);
            background: rgba(255,255,255,0.02);
        }
        
        .section-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }
        
        .section-info {
            flex: 1;
        }
        
        .section-name {
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            margin-bottom: 4px;
        }
        
        .section-meta {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        
        .section-actions {
            display: flex;
            gap: 8px;
        }
        
        .album-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.03);
        }
        
        .album-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }
        
        .album-item-name {
            padding: 10px 12px 4px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        
        .album-item-count {
            padding: 0 12px 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }
        
        .album-item-buttons {
            padding: 0 12px 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .album-item-buttons .btn {
            flex: 1;
            min-width: 60px;
        }
        
        .album-edit-btn {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(67, 97, 238, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
        }
        
        .album-item:hover .album-edit-btn {
            opacity: 1;
        }
        
        .album-delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(231, 76, 60, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            opacity: 0;
            transition: var(--transition);
        }
        
        .album-item:hover .album-delete-btn {
            opacity: 1;
        }
        
        .section-list, .album-list {
            list-style: none;
            margin-top: 16px;
        }
        
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            font-size: 0.9rem;
        }
        
        .message.success {
            background: rgba(6, 214, 160, 0.1);
            color: #06d6a0;
            border: 1px solid rgba(6, 214, 160, 0.15);
        }
        
        .message.error {
            background: rgba(231, 76, 60, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(231, 76, 60, 0.15);
        }
        
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 36px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 16px;
        }
        
        .upload-area:hover {
            border-color: rgba(67, 97, 238, 0.4);
            background: rgba(67, 97, 238, 0.05);
        }
        
        .upload-area p {
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }
        
        #file-input {
            display: none;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            padding: 36px 44px;
            border-radius: 20px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .progress-bar-wrapper {
            width: 100%;
        }

        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4361ee, #7209b7);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(67, 97, 238, 0.3);
        }

        .progress-bar-text {
            margin-top: 10px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            font-weight: 500;
            letter-spacing: 1px;
        }

        #loading-status {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }

        #loading-detail {
            color: rgba(255,255,255,0.35);
            font-size: 0.82rem;
        }
    </style>
</head>
<body>
    <div class="bg-decor">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <div class="content-layer">
    <div class="admin-container">
        <div class="admin-header">
            <h1>管理后台</h1>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="section" id="config-section">
            <h2>GitHub 配置</h2>
            <div class="form-group">
                <label>GitHub Personal Access Token</label>
                <input type="password" id="token-input" placeholder="输入你的 GitHub Token">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>仓库所有者</label>
                    <input type="text" id="owner-input" placeholder="GitHub 用户名">
                </div>
                <div class="form-group">
                    <label>仓库名称</label>
                    <input type="text" id="repo-input" placeholder="travel-photos">
                </div>
            </div>
            <button class="btn btn-primary" id="save-config">保存配置</button>
        </div>
        
        <div class="section" id="section-mgmt">
            <h2>板块管理</h2>
            <p style="color: rgba(255,255,255,0.35); font-size: 0.85rem; margin-bottom: 12px;">每个板块对应地图上的一个标记，包含多个相册</p>
            <button class="btn btn-success" id="add-section">+ 新建板块</button>
            <ul class="section-list" id="section-list"></ul>
        </div>
        
        <div class="section" id="album-section" style="display: none;">
            <h2>相册管理 - <span id="current-section-name"></span></h2>
            <button class="btn btn-success" id="add-album">+ 新建相册</button>
            <div class="album-grid" id="album-list"></div>
        </div>
        
        <div class="section" id="upload-section" style="display: none;">
            <h2>上传图片</h2>
            <input type="file" id="album-file-input" accept="image/*" multiple style="display: none;">
            <button class="btn btn-primary" id="upload-images">选择图片上传</button>
        </div>
    </div>
    </div>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loading-status" style="margin-top: 15px; font-weight: 600;">处理中...</p>
            <p id="loading-detail" style="margin-top: 6px; font-size: 0.85rem; color: #6b7280;"></p>
            <div class="progress-bar-wrapper" id="progress-wrapper" style="display: none; margin-top: 14px;">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="progress-bar-text" id="progress-text">0%</div>
            </div>
        </div>
    </div>
    
    <script src="js/crypto.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/compressor.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
