<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片画廊 - 旅行相册</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <header class="gallery-header">
        <div class="container">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                返回首页
            </a>
            <h1 id="region-title">加载中...</h1>
            <p class="gallery-subtitle" id="region-count"></p>
        </div>
    </header>

    <main class="container">
        <div class="gallery-grid" id="gallery-grid">
            <div class="loading-spinner" id="loading"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 旅行相册 | 由 GitHub Pages 提供支持</p>
    </footer>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-container">
            <button class="lightbox-close" id="lightbox-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button class="lightbox-nav lightbox-prev" id="lightbox-prev">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="lightbox-image-wrapper">
                <img src="" alt="预览图片" id="lightbox-image">
            </div>
            <button class="lightbox-nav lightbox-next" id="lightbox-next">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <div class="lightbox-info">
                <span class="lightbox-counter" id="lightbox-counter">1 / 6</span>
            </div>
        </div>
    </div>

    <script src="js/crypto.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
