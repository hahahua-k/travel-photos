<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行相册 - 记录美好旅程</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="bg-decor">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <div class="content-layer">
        <header class="hero-header">
            <div class="header-orbs">
                <div class="header-orb"></div>
                <div class="header-orb"></div>
                <div class="header-orb"></div>
            </div>
            <div class="container">
                <h1>旅行相册</h1>
                <p>记录每一段美好的旅程</p>
            </div>
        </header>

        <section class="map-section">
            <div class="map-wrapper" id="map-wrapper">
                <div class="map-scene" id="map-scene">
                    <svg class="china-map" id="china-map" viewBox="620 60 180 600" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:rgba(67,97,238,0.25);stop-opacity:1" />
                                <stop offset="100%" style="stop-color:rgba(114,9,183,0.15);stop-opacity:1" />
                            </linearGradient>
                            <filter id="mapShadow">
                                <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(67,97,238,0.3)" />
                            </filter>
                        </defs>
                        <use href="china.svg#path" fill="url(#mapGrad)" stroke="rgba(67,97,238,0.4)" stroke-width="0.8" filter="url(#mapShadow)" />
                    </svg>
                    <div class="map-markers" id="map-markers"></div>
                </div>
            </div>
            <div class="map-hint">拖拽地图旋转 · 点击标记查看相册</div>
        </section>

        <section class="albums-section">
            <div class="albums-track-wrapper">
                <div class="albums-track" id="albums-track">
                    <div class="loading-spinner" id="loading"></div>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2024 旅行相册 | 由 GitHub Pages 提供支持</p>
        </footer>
    </div>

    <div class="modal" id="password-modal">
        <div class="modal-content modal-enter">
            <h3>输入密码访问</h3>
            <input type="password" id="password-input" placeholder="请输入访问密码" autocomplete="off">
            <button class="btn" id="password-submit">确认访问</button>
            <p class="error" id="password-error">密码错误，请重试</p>
        </div>
    </div>

    <script src="js/crypto.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
