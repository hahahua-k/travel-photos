<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行相册 - 记录美好旅程</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="bg-decor">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <div class="content-layer">
        <header class="hero-header">
            <div class="header-orbs">
                <div class="header-orb"></div>
                <div class="header-orb"></div>
                <div class="header-orb"></div>
            </div>
            <div class="container">
                <h1>旅行相册</h1>
                <p>记录每一段美好的旅程</p>
            </div>
        </header>

        <section class="map-section">
            <div class="map-wrapper" id="map-wrapper">
                <div class="map-scene" id="map-scene">
                    <img class="china-map-img" src="china.svg" alt="中国地图">
                    <div class="map-markers" id="map-markers"></div>
                </div>
            </div>
            <div class="map-hint">拖拽地图旋转 · 点击标记查看相册</div>
        </section>

        <section class="albums-section">
            <div class="albums-track-wrapper">
                <div class="albums-track" id="albums-track">
                    <div class="loading-spinner" id="loading"></div>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2024 旅行相册 | 由 GitHub Pages 提供支持</p>
        </footer>
    </div>

    <div class="modal" id="password-modal">
        <div class="modal-content modal-enter">
            <h3>输入密码访问</h3>
            <input type="password" id="password-input" placeholder="请输入访问密码" autocomplete="off">
            <button class="btn" id="password-submit">确认访问</button>
            <p class="error" id="password-error">密码错误，请重试</p>
        </div>
    </div>

    <div class="section-modal" id="section-modal">
        <div class="section-modal-overlay"></div>
        <div class="section-modal-container">
            <button class="section-modal-close" id="section-modal-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <h2 class="section-modal-title" id="section-modal-title"></h2>
            <div class="section-modal-grid" id="section-modal-content"></div>
        </div>
    </div>

    <script src="js/crypto.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
